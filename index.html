<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>小方塊世界 2.5</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<canvas id="c"></canvas>
<!-- Overlay and UI elements (shortened for module transition) -->
<div id="overlay">
  <div class="box">
    <h1>⛏️ 小方塊世界 2.5 ⛏️</h1>
    <button onclick="startGame()">🚀 開始遊戲！</button>
  </div>
</div>
<script type="module">
import { initGame } from './js/main.js';

window.startGame = function() {
  const overlay = document.getElementById('overlay');
  if (overlay) overlay.style.display = 'none';
  initGame();
};

console.log('✅ Module entry loaded');
</script>
</body>
</html>
