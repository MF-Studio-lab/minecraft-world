name: Deploy GitHub Pages

# 只在 main 分支有變更時執行
on:
  push:
    branches: [ main ]

# 必要的權限：寫入 Pages、取得 OIDC token
permissions:
  contents: read          # 讀取 repo
  pages: write            # 寫入 GitHub Pages
  id-token: write         # 產生 OIDC token

jobs:
  # -------------------------------------------------
  # 1️⃣ Build – 產生靜態檔案 (此範例使用 npm)
  # -------------------------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node (使用 LTS 版，避免 punycode 警告)
        uses: actions/setup-node@v4
        with:
          node-version: '20'          # 20+ 版已不再使用內建 punycode
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        # 依照你的專案調整指令，以下假設產出在 ./dist
        run: npm run build

      - name: Upload artifact for Pages
        uses: actions/upload-artifact@v4
        with:
          name: github-pages          # ← 這個名稱必須與 deploy 步驟的 artifact_name 相同
          path: ./dist                # ← 產出的靜態檔案目錄

  # -------------------------------------------------
  # 2️⃣ Deploy – 把 artifact 部署到 GitHub Pages
  # -------------------------------------------------
  deploy:
    needs: build                     # 等 build 完成後才執行
    runs-on: ubuntu-latest
    environment: github-pages        # 若在 Settings → Environments 設了 github-pages，請保留此行
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages   # 必須與上一步的 name 完全相同